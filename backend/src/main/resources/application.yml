spring:
  application:
    name: taichinh-backend
  config:
    import: optional:file:.env[.properties]

  datasource:
    url: jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5433}/${DB_NAME:taichinh_db}
    username: ${DB_USERNAME:taichinh_user}
    password: ${DB_PASSWORD:taichinh_pass}
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: true
    properties:
      hibernate:
        format_sql: true
        dialect: org.hibernate.dialect.PostgreSQLDialect

  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true
    baseline-version: 1

server:
  port: ${SERVER_PORT:8080}

# JWT Configuration
jwt:
  secret: ${JWT_SECRET:6a97cf0ec9b546c892c47f5d6e4d872f5cc4a6f1d9e34b7ca240be7d11a5fc92}
  expiration: ${JWT_EXPIRATION:86400000}   # 1 day in ms
  refresh-expiration: ${JWT_REFRESH_EXPIRATION:604800000}   # 7 days in ms

# CORS - cho phép FE gọi vào BE
cors:
  allowed-origins: ${CORS_ORIGINS:http://localhost:5173}

logging:
  level:
    com.taichinh: DEBUG
    org.springframework.security: DEBUG
